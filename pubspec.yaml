name: student_app
description: Flutter Multi-Screen App — Part 2 CRUD API Integration

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # ---- NEW in Part 2 ----
